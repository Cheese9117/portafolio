<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Arial, Helvetica, sans-serif">
  <rect width="1280" height="720" fill="#efe7d7"/>

  <!-- nav -->
  <text x="64" y="52" font-family="Georgia, serif" font-size="30" fill="#123227">Vélez</text>
  <text x="64" y="68" font-size="9" letter-spacing="2" fill="#4e8a6f">ODONTOLOGÍA CON CALMA</text>
  <g font-size="14" fill="#2c2620">
    <text x="600" y="52">Tu primera cita</text>
    <text x="742" y="52">Precios</text>
    <text x="828" y="52">Quién te atiende</text>
    <text x="972" y="52">Dudas</text>
  </g>
  <rect x="1064" y="30" width="152" height="38" rx="19" fill="#123227"/>
  <text x="1140" y="55" font-size="15" fill="#efe7d7" text-anchor="middle">Hablemos</text>

  <!-- hero left -->
  <text x="64" y="176" font-size="13" letter-spacing="2.5" fill="#4e8a6f">ODONTÓLOGA EN ENVIGADO</text>
  <g font-family="Georgia, serif" fill="#123227" font-size="52">
    <text x="62" y="250">Soy Elena. Sé que</text>
    <text x="62" y="312">venir al odontólogo</text>
    <text x="62" y="374">da susto.</text>
  </g>
  <!-- subrayado miel dibujado a mano -->
  <path d="M66 390 C 130 382, 190 398, 300 388" fill="none" stroke="#e0a32e" stroke-width="6" stroke-linecap="round"/>

  <g font-size="18" fill="#8c8375">
    <text x="64" y="436">Un solo doctor —yo— de principio a fin, sin afán</text>
    <text x="64" y="462">y con los precios a la vista.</text>
  </g>

  <rect x="64" y="500" width="330" height="52" rx="26" fill="#123227"/>
  <text x="229" y="533" font-size="16" fill="#efe7d7" text-anchor="middle">Agenda tu espacio de valoración</text>
  <rect x="410" y="500" width="200" height="52" rx="26" fill="none" stroke="#123227" stroke-width="1.5"/>
  <text x="510" y="533" font-size="16" fill="#123227" text-anchor="middle">Mira cómo trabajo</text>

  <text x="64" y="596" font-size="14" fill="#8c8375">Envigado · Lun a Sáb · <tspan fill="#123227" font-weight="bold">Primera valoración sin costo</tspan></text>

  <!-- portrait right -->
  <rect x="712" y="150" width="504" height="470" rx="24" fill="#123227"/>
  <ellipse cx="964" cy="330" rx="150" ry="150" fill="#1d4638"/>
  <path d="M814 620 v-70 a150 150 0 0 1 300 0 v70 z" fill="#1d4638"/>
  <rect x="736" y="556" width="216" height="46" rx="23" fill="#efe7d7"/>
  <text x="752" y="578" font-size="14" font-weight="bold" fill="#123227">Dra. Elena Vélez</text>
  <text x="752" y="594" font-size="11" fill="#8c8375">Rehabilitación oral</text>
</svg>
